version: "1.0.0"

settings:
  runInParallel: false
  stopOnFirstFailure: true

gates:
  intake-gate:
    name: Claim Intake Validation
    description: Verifies that a claim has all required documentation.
    type: manual
    required: true
    criteria:
      - Claim form is fully completed.
      - Date, time, and location of incident are specified.
      - Initial supporting photos or reports are attached.
    reviewer: "Claims Processor (Chris)"
    onFailure: block

  assessment-gate:
    name: Policy Coverage Assessment Review
    description: Validates that the claim assessment correctly matches policy terms.
    type: manual
    required: true
    criteria:
      - Policy number is verified as active on date of loss.
      - Coverage limits are correctly identified.
      - Any relevant exclusions are checked.
    reviewer: "Policy Analyst (Pat)"
    onFailure: block

  settlement-approval:
    name: Final Settlement Approval
    description: Final sign-off on the settlement offer.
    type: manual
    required: true
    criteria:
      - Calculation matches the assessment report.
      - Offer letter is clear and professional.
      - Total amount is within authorized limits.
    reviewer: "Compliance Officer (Casey)"
    onFailure: block

  compliance-check:
    name: Regulatory Compliance Review
    description: Ensures new client files meet all regulatory requirements.
    type: manual
    required: true
    criteria:
      - All required signatures are present.
      - PII is correctly handled/masked.
      - State-specific disclosures have been provided.
    reviewer: "Compliance Officer (Casey)"
    onFailure: block
