id: claims-processing
name: Claims Processing Workflow
description: End-to-end processing of an insurance claim from intake to settlement.
version: "1.0.0"

steps:
  - id: claim-intake
    order: 1
    name: Claim Intake & Validation
    owner: "Claims Processor (Chris)"
    description: Receive claim report and verify all necessary documents are provided.
    outputs:
      - name: validated-claim
        description: Claim data with initial validation status
        format: json
    qualityGate: intake-gate

  - id: coverage-assessment
    order: 2
    name: Coverage & Policy Assessment
    owner: "Policy Analyst (Pat)"
    description: Evaluate the claim against the specific policy terms and coverage limits.
    dependsOn: [claim-intake]
    inputs:
      - name: validated-claim
        format: json
        required: true
    outputs:
      - name: assessment-report
        description: Detailed assessment of coverage
        format: markdown
    qualityGate: assessment-gate

  - id: settlement-offer
    order: 3
    name: Settlement Calculation & Offer
    owner: "Claims Processor (Chris)"
    description: Calculate the settlement amount and draft an offer for the client.
    dependsOn: [coverage-assessment]
    inputs:
      - name: assessment-report
        format: markdown
        required: true
    outputs:
      - name: final-offer
        description: Drafted settlement offer
        format: markdown
    qualityGate: settlement-approval
