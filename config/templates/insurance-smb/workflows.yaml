# Insurance SMB Workflows

- id: new-client-onboarding
  name: New Client Onboarding
  description: A multi-step flow to verify a new client, analyze their risk, and finalize coverage.
  steps:
    - id: document-intake
      name: Document Intake
      owner: "Client Comm Manager (Charlie)"
    - id: risk-analysis
      name: Risk Profile & Analysis
      owner: "Policy Analyst (Pat)"
    - id: compliance-review
      name: Final Compliance Review
      owner: "Compliance Officer (Casey)"

- id: claims-processing
  name: Claims Processing Workflow
  description: End-to-end processing of an insurance claim from intake to settlement.
  steps:
    - id: claim-intake
      name: Claim Intake & Validation
      owner: "Claims Processor (Chris)"
    - id: coverage-assessment
      name: Coverage & Policy Assessment
      owner: "Policy Analyst (Pat)"
    - id: settlement-offer
      name: Settlement Calculation & Offer
      owner: "Claims Processor (Chris)"

- id: renewal-and-cross-sell
  name: Renewal Reminder + Cross-Sell
  description: Proactive outreach to existing clients for renewals with personalized cross-sell recommendations.
  steps:
    - id: renewal-check
      name: Identify Upcoming Renewals
      owner: "Client Comm Manager (Charlie)"
    - id: cross-sell-analysis
      name: Cross-Sell Opportunity Analysis
      owner: "Policy Analyst (Pat)"
    - id: client-outreach
      name: Personalized Client Outreach
      owner: "Client Comm Manager (Charlie)"
