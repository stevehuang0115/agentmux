version: "1.0.0"

settings:
  runInParallel: false
  stopOnFirstFailure: true

gates:
  curriculum-quality:
    name: Curriculum Quality Gate
    description: Ensures the curriculum is structured and aligned with objectives.
    type: manual
    required: true
    criteria:
      - Clear learning objectives for each module.
      - Logical progression of lessons.
      - Inclusion of assessment points.
    reviewer: "Curriculum Designer (Alex)"
    onFailure: block

  content-quality:
    name: Content Quality Gate
    description: Validates lesson materials against content standards.
    type: manual
    required: true
    criteria:
      - Alignment with curriculum outline.
      - Reading level appropriate for target audience.
      - No placeholders or unfinished sections.
    reviewer: "Curriculum Designer (Alex)"
    onFailure: block

  final-approval:
    name: Final Content Approval
    description: Final sign-off before content deployment.
    type: manual
    required: true
    criteria:
      - All peer review comments addressed.
      - Visual assets suggested or integrated.
      - Compliance check completed.
    reviewer: "Curriculum Designer (Alex)"
    onFailure: block

  compliance-check:
    name: Compliance & Privacy Gate
    description: Verify communication is FERPA/COPPA compliant.
    type: manual
    required: true
    criteria:
      - No student PII exposed.
      - Clear and professional tone.
      - Necessary privacy disclosures included.
    reviewer: "Student Engagement Manager (Sam)"
    onFailure: block

  reporting-quality:
    name: Report Quality Gate
    description: Ensures report accuracy and clarity.
    type: manual
    required: true
    criteria:
      - All key metrics included.
      - Insights are data-backed.
      - Actionable recommendations provided.
    reviewer: "Analytics Specialist (Skyler)"
    onFailure: block
