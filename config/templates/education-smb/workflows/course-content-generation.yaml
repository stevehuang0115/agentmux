id: course-content-generation
name: Course Content Generation
description: Workflow to design curriculum and generate lesson content.
version: "1.0.0"

steps:
  - id: design-curriculum
    order: 1
    name: Curriculum Design
    owner: "Curriculum Designer (Alex)"
    description: Create the course outline and learning objectives.
    outputs:
      - name: course-outline
        description: Structured curriculum outline
        format: markdown
    qualityGate: curriculum-quality

  - id: generate-content
    order: 2
    name: Content Generation
    owner: "Content Creator (Casey)"
    description: Develop lesson materials based on the outline.
    dependsOn: [design-curriculum]
    inputs:
      - name: course-outline
        format: markdown
        required: true
    outputs:
      - name: lesson-materials
        description: Draft lesson content
        format: markdown
    qualityGate: content-quality

  - id: review-and-finalize
    order: 3
    name: Final Review
    owner: "Curriculum Designer (Alex)"
    description: Review the generated content against the curriculum goals.
    dependsOn: [generate-content]
    inputs:
      - name: lesson-materials
        format: markdown
        required: true
    qualityGate: final-approval
