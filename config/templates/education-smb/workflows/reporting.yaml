id: education-reporting
name: Weekly/Monthly Reporting
description: Generate comprehensive performance and operational reports.
version: "1.0.0"

steps:
  - id: collect-metrics
    order: 1
    name: Metrics Collection
    owner: "Analytics Specialist (Skyler)"
    description: Gather data on student progress, engagement, and token usage.
    outputs:
      - name: raw-metrics
        description: Collected metrics data
        format: json

  - id: generate-report
    order: 2
    name: Report Generation
    owner: "Analytics Specialist (Skyler)"
    description: Create a structured report summarizing the metrics and identifying trends.
    dependsOn: [collect-metrics]
    inputs:
      - name: raw-metrics
        format: json
        required: true
    outputs:
      - name: final-report
        description: Final weekly/monthly report
        format: markdown
    qualityGate: reporting-quality
