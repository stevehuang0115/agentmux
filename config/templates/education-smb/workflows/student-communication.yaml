id: student-communication
name: Student Communication Workflow
description: Automating onboarding and feedback loops for students.
version: "1.0.0"

steps:
  - id: analyze-feedback
    order: 1
    name: Feedback Sentiment Analysis
    owner: "Student Engagement Manager (Sam)"
    description: Process recent student feedback to identify sentiment and common themes.
    outputs:
      - name: feedback-summary
        description: Summary of student sentiment
        format: json
    requiredSkills:
      - feedback-analyzer

  - id: draft-announcement
    order: 2
    name: Draft Communication
    owner: "Content Creator (Casey)"
    description: Draft a newsletter or announcement based on feedback or upcoming events.
    dependsOn: [analyze-feedback]
    inputs:
      - name: feedback-summary
        format: json
        required: true
    outputs:
      - name: draft-comm
        description: Drafted student communication
        format: markdown

  - id: approve-and-send
    order: 3
    name: Communication Approval
    owner: "Student Engagement Manager (Sam)"
    description: Review and approve the communication for FERPA/COPPA compliance.
    dependsOn: [draft-announcement]
    inputs:
      - name: draft-comm
        format: markdown
        required: true
    qualityGate: compliance-check
